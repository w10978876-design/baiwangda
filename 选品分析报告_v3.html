<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>选品分析报告</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1510;
    --paper: #f5f0e8;
    --accent: #c8401a;
    --muted: #7a6e60;
    --rule: #d4c9b5;
    --hot: #c8401a;
    --rise: #2d6a4f;
    --flat: #5c6970;
    --cold: #9e9e9e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink); font-family: 'Noto Serif SC', serif; min-height: 100vh; }

  /* banner */
  .banner { background: var(--ink); color: var(--paper); padding: 28px 48px 22px; display: flex; align-items: baseline; gap: 24px; border-bottom: 3px solid var(--accent); }
  .banner-title { font-family: 'Instrument Serif', serif; font-size: 2rem; letter-spacing: 0.02em; }
  .banner-sub { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: #9e8e78; letter-spacing: 0.1em; text-transform: uppercase; }
  .banner-meta { margin-left: auto; text-align: right; }
  .banner-tag { display: inline-block; background: var(--accent); color: white; font-family: 'DM Mono', monospace; font-size: 0.7rem; padding: 4px 12px; letter-spacing: 0.08em; }
  .banner-time { display: block; font-family: 'DM Mono', monospace; font-size: 0.65rem; color: #9e8e78; margin-top: 6px; }

  /* cat bar */
  .cat-bar { background: #ede7d8; border-bottom: 1px solid var(--rule); padding: 0 48px; display: flex; flex-wrap: wrap; }
  .cat-btn { font-family: 'Noto Serif SC', serif; font-size: 0.9rem; padding: 14px 24px; border: none; background: transparent; cursor: pointer; color: var(--muted); border-bottom: 3px solid transparent; transition: all 0.2s; letter-spacing: 0.05em; }
  .cat-btn.active, .cat-btn:hover { color: var(--ink); border-bottom-color: var(--accent); }
  .cat-btn.active { font-weight: 700; }

  /* layout */
  .main { display: flex; min-height: calc(100vh - 120px); }
  .sidebar { width: 280px; flex-shrink: 0; border-right: 1px solid var(--rule); padding: 32px 24px; background: #f0ebe0; }
  .content { flex: 1; padding: 36px 48px; max-width: 900px; }

  /* sidebar */
  .sidebar-label { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  .data-card { background: white; border: 1px solid var(--rule); padding: 14px 16px; margin-bottom: 10px; border-left: 3px solid transparent; }
  .data-card.hot { border-left-color: var(--hot); }
  .data-card.rise { border-left-color: var(--rise); }
  .data-card.cold { border-left-color: var(--cold); }
  .data-card-label { font-size: 0.72rem; color: var(--muted); margin-bottom: 4px; font-family: 'DM Mono', monospace; }
  .data-card-val { font-size: 1.4rem; font-weight: 700; line-height: 1; }
  .data-card-sub { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }
  .divider { border: none; border-top: 1px solid var(--rule); margin: 20px 0; }

  /* heat bars */
  .tag-list { display: flex; flex-direction: column; gap: 6px; }
  .tag-row { display: flex; align-items: center; gap: 8px; }
  .tag-name { font-size: 0.8rem; width: 56px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tag-bar-wrap { flex: 1; background: #e4ddd0; height: 8px; }
  .tag-bar { height: 100%; transition: width 0.9s ease; }
  .tag-score { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); width: 30px; text-align: right; }

  /* content */
  .section-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid var(--ink); }
  .section-num { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; }
  .section-title { font-size: 1.25rem; font-weight: 700; letter-spacing: 0.03em; }
  .section-body { margin-bottom: 40px; }

  /* AI box */
  .report-box { border: 1px solid var(--rule); background: white; padding: 28px 32px; line-height: 1.9; font-size: 0.95rem; position: relative; min-height: 120px; }
  .report-box::before { content: 'AI 分析'; font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.15em; color: var(--muted); position: absolute; top: -10px; left: 16px; background: white; padding: 0 6px; }
  .report-placeholder { color: var(--muted); font-style: italic; font-size: 0.9rem; }
  .loading-dots span { display: inline-block; animation: blink 1.2s infinite; }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

  /* matrix */
  .matrix { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
  .matrix-cell { border: 1px solid var(--rule); padding: 16px; background: white; }
  .matrix-cell.highlight { border-color: var(--accent); background: #fff8f5; }
  .matrix-cell-title { font-size: 0.78rem; font-weight: 700; margin-bottom: 6px; color: var(--accent); font-family: 'DM Mono', monospace; letter-spacing: 0.08em; }
  .matrix-cell-title.grey { color: var(--muted); }
  .matrix-cell p { font-size: 0.82rem; line-height: 1.6; color: var(--muted); }

  /* signals */
  .signal { display: inline-block; padding: 2px 8px; font-size: 0.72rem; font-family: 'DM Mono', monospace; margin-right: 6px; margin-bottom: 4px; }
  .signal.hot   { background: #fde8e2; color: var(--hot); }
  .signal.rise  { background: #e2f0e8; color: var(--rise); }
  .signal.blank { background: #fff3cd; color: #856404; }
  .signal.cold  { background: #f0f0f0; color: var(--cold); }

  /* button */
  .btn-generate { background: var(--ink); color: var(--paper); border: none; padding: 12px 28px; font-family: 'Noto Serif SC', serif; font-size: 0.9rem; cursor: pointer; letter-spacing: 0.08em; transition: background 0.2s; margin-top: 16px; }
  .btn-generate:hover { background: var(--accent); }
  .btn-generate:disabled { background: var(--muted); cursor: not-allowed; }

  /* table */
  .data-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin-top: 12px; }
  .data-table th { background: var(--ink); color: var(--paper); padding: 8px 12px; text-align: left; font-weight: 400; font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.06em; }
  .data-table td { padding: 8px 12px; border-bottom: 1px solid var(--rule); }
  .data-table tr:hover td { background: #ede7d8; }
  .num { font-family: 'DM Mono', monospace; }
  .table-tools { margin: 10px 0 6px; display: flex; justify-content: flex-end; }
  .table-tools select { border: 1px solid var(--rule); background: #fff; padding: 4px 8px; font-size: 0.78rem; color: var(--ink); }

  /* states */
  .state-msg { text-align: center; padding: 48px 24px; color: var(--muted); font-style: italic; }
  .state-err { text-align: center; padding: 48px 24px; color: var(--hot); line-height: 2; }

  .fade-in { animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  .matrix-trend-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; grid-column: 1 / -1; align-items: stretch; }
  .pred-mini { font-size: 0.8rem; line-height: 1.65; color: var(--ink); margin-top: 6px; }
  .pred-mini strong { font-weight: 700; color: var(--accent); }
  .pred-out { margin-top: 10px; font-size: 0.82rem; line-height: 1.75; color: var(--ink); white-space: pre-wrap; max-height: 240px; overflow-y: auto; padding: 10px; background: #fff; border: 1px solid var(--rule); border-radius: 2px; }
  .pred-out.is-static { max-height: min(70vh, 520px); border-color: var(--accent); border-width: 1px 1px 1px 3px; }
  .pred-static-head { display: none; margin-top: 10px; margin-bottom: 6px; font-size: 0.88rem; font-weight: 700; color: var(--accent); letter-spacing: 0.06em; }
  .pred-static-head.visible { display: block; }
  .pred-static-note { display: none; margin-top: 8px; font-size: 0.72rem; color: var(--muted); line-height: 1.5; padding: 6px 8px; background: #f0ebe0; border: 1px dashed var(--rule); }
  .pred-static-note.visible { display: block; }
  .pred-tools.is-hidden { display: none !important; }
  .pred-tools { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .pred-tools input[type="password"] { flex: 1; min-width: 120px; border: 1px solid var(--rule); padding: 6px 8px; font-size: 0.75rem; font-family: 'DM Mono', monospace; }
  .btn-pred { background: var(--ink); color: var(--paper); border: none; padding: 8px 14px; font-family: 'Noto Serif SC', serif; font-size: 0.8rem; cursor: pointer; letter-spacing: 0.06em; transition: background 0.2s; }
  .btn-pred:hover { background: var(--accent); }
  .btn-pred:disabled { background: var(--muted); cursor: not-allowed; }
  .btn-pred-secondary { background: #5c5348; }
  @media (max-width: 820px) {
    .matrix-trend-pair { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="banner">
  <div>
    <div class="banner-title">选品分析报告</div>
    <div class="banner-sub">Consumer Acceptance Intelligence · FMCG</div>
  </div>
  <div class="banner-meta">
    <span class="banner-tag">AI POWERED</span>
    <span class="banner-time" id="gen-time">数据加载中…</span>
  </div>
</div>

<div class="cat-bar" id="cat-bar">
  <div class="state-msg" style="padding:14px 0">正在读取数据…</div>
</div>

<div class="main">
  <div class="sidebar" id="sidebar"><div class="state-msg">正在加载…</div></div>
  <div class="content"  id="content"><div class="state-msg">正在加载…</div></div>
</div>

<!-- 可选：同目录下放 local_settings.js；?v= 用于避免浏览器缓存旧 404 -->
<script src="local_settings.js?v=3"></script>
<script>
// ══════════════════════════════════════════════════
// 配置：JSON 与 fmcg_analysis_v3.py 输出一致（脚本目录下 商品标签热度分析_热度数据.json）
// 可选：?data=别的文件名.json  或  ?data=/绝对路径/xxx.json（同源时）
// 可选：?pred=别的预生成预测.json（默认 sku_predictions_static.json，与报告同目录）
// file:// 或 Cursor 内置预览常无法 fetch 本地 JSON → 请用下方「选择 JSON」或本地 HTTP 服务
// ══════════════════════════════════════════════════
const JSON_BASENAME = "商品标签热度分析_热度数据.json";
/** 同目录 sku_predictions_static.json 的 by_cat 与热度 JSON 顶层 sku_predictions_by_cat 可并存：同品类键以静态文件为准（Pages 更新 push 后不被热度里旧字段盖掉），热度 JSON 仅补缺品类。 */
const STATIC_PRED_BASENAME = "sku_predictions_static.json";

/** 预生成预测：按品类短文本；fetch 成功且含 by_cat 时启用 */
let STATIC_SKU_PRED_BY_CAT = null;

/** 前端暂不展示的品类（数据仍在 JSON 中，仅隐藏入口） */
const HIDDEN_CATEGORIES = new Set(["家居百货", "日化美护"]);

let DATA = null;
let CURRENT_CAT = null;
let CURRENT_BODY_BRAND_FILTER = "__ALL__";
const RECENT_NEWS_BY_CAT = {
  "FF速食": [
    "乐##：官网长期商品中，关东煮（汪角鱼蛋、黄金肉包蛋）、烧烤系列（红油面筋串、魔辣霸王翅）、老南昌鲜汁大肉包、江西瓦罐汤等鲜食/热食结构稳定，属门店常规 FF 线。江西米粉系列（肉末拌粉、大骨熬制肉末配纯真米浆粉条等）属粉面线。",
    "乐##：3月1日（周一）推出新品日活动，霸王黑胡椒烤肠100g限时买一送一。",
    "渠道B：招牌葡式蛋挞持续在售。",
    "邻#：品牌长期以“一日五餐”鲜食为特色，早餐主推烧麦、大肉包、鲜肉包等。",
    "罗#：周一现磨咖啡、面包甜心等与鲜食时段联动；草莓季主推甜品与季节性 FF 营销并行。"
  ],
  "休闲零食": [
    "乐##：烧烤系列（红油面筋串、魔辣霸王翅）在品类划分上兼具即食小食属性；冰皮蛋糕更偏烘焙甜品，与零食场景有交叉。",
    "罗#：周三“零食日”满39减10；3月初草莓季中脆脆糯米糍等偏甜品零食；拓麻歌子联名满139元赠周边，带动零食/组合购场景。"
  ],
  "冷冻食品": ["各品牌：本周期未见冷冻食品类专项公开信息。"],
  "常温乳品": ["各品牌：本周期未见常温乳品类专项公开信息。"],
  "方便速食": ["各品牌：本周期未见方便速食类专项公开信息。"],
  "日配冷藏": [
    "罗#：周四“冷藏品满39减10”，为日配冷藏类目的周期性促销机制。3月初草莓季，冰皮月亮蛋糕、脆脆糯米糍为当季主力，两件任选18.5元；草莓系列为华东、华中年度标志性营销表述。",
    "渠道A：以自有鲜牛奶为主推品类之一（与 NFC 果汁并列）。",
    "乐##：冰皮蛋糕系列（星空冰皮、极光冰皮）。冰皮蛋糕更偏烘焙甜品，与零食场景有交叉。",
    "乐##：冰淇淋奶盖麻薯草莓味同步上架，单品规格2粒装100g，主打糯叽叽加奶fufu的冰爽口感。"
  ],
  "日配烘焙": ["罗#：周一面包及甜心小森系列2件8折、3件6.6折；周五面包5件及以上6.6折。"],
  "粮油调味": ["各品牌：本周期未见粮油、调味品类专项公开信息。"],
  "酒类": ["渠道B：精酿啤酒持续在售，精酿啤酒为门店特色品类。"],
  "饮料": [
    "渠道A：主推自有 NFC 果汁。",
    "渠道B：3月17日推出苹果汁或鲜椰水3次卡套餐，春日福利。"
  ]
};

function resolveJsonFetchUrl() {
  const q = new URLSearchParams(window.location.search).get("data");
  if (q && q.trim()) {
    try {
      return new URL(q.trim(), window.location.href).href;
    } catch (e) {
      return q.trim();
    }
  }
  return new URL(JSON_BASENAME, window.location.href).href;
}

function resolveStaticPredFetchUrl() {
  const q = new URLSearchParams(window.location.search).get("pred");
  if (q && q.trim()) {
    try {
      return new URL(q.trim(), window.location.href).href;
    } catch (e) {
      return q.trim();
    }
  }
  // 与热度 JSON 同目录（避免 ?data= 子路径时预测文件 404）
  try {
    return new URL(STATIC_PRED_BASENAME, resolveJsonFetchUrl()).href;
  } catch (e) {
    return new URL(STATIC_PRED_BASENAME, window.location.href).href;
  }
}

/** 静态预测 fetch URL，带时间戳避免 CDN/浏览器返回旧 json */
function resolveStaticPredFetchUrlBusted() {
  const u = resolveStaticPredFetchUrl();
  return u + (String(u).includes("?") ? "&" : "?") + "_=" + encodeURIComponent(String(Date.now()));
}

async function applyStaticPredFetchResponse(predResp) {
  STATIC_SKU_PRED_BY_CAT = null;
  window.__STATIC_SKU_PRED_META__ = null;
  if (!predResp || !predResp.ok) return;
  try {
    const j = await predResp.json();
    if (j && typeof j.by_cat === "object" && j.by_cat !== null) {
      STATIC_SKU_PRED_BY_CAT = j.by_cat;
      window.__STATIC_SKU_PRED_META__ = {
        generated_at: j.generated_at != null ? String(j.generated_at) : "",
        note: j.note != null ? String(j.note) : "",
      };
    }
  } catch (e) {}
}

/** 若热度 JSON 含 sku_predictions_by_cat，则合并到 STATIC：同 key 以 sku_predictions_static.json 已加载内容为准，热度侧仅补缺。 */
function hydrateSkuPredictionsFromData() {
  if (!DATA) return;
  const fromData = DATA.sku_predictions_by_cat;
  if (!fromData || typeof fromData !== "object") return;
  if (!STATIC_SKU_PRED_BY_CAT || typeof STATIC_SKU_PRED_BY_CAT !== "object") {
    STATIC_SKU_PRED_BY_CAT = {};
  }
  for (const k of Object.keys(fromData)) {
    const v = fromData[k];
    if (v == null || !String(v).trim()) continue;
    const existing = STATIC_SKU_PRED_BY_CAT[k];
    if (existing != null && String(existing).trim()) continue;
    STATIC_SKU_PRED_BY_CAT[k] = String(v).trim();
  }
  window.__STATIC_SKU_PRED_META__ = window.__STATIC_SKU_PRED_META__ || { generated_at: "", note: "" };
  const dn = DATA.sku_predictions_note != null ? String(DATA.sku_predictions_note).trim() : "";
  if (dn) window.__STATIC_SKU_PRED_META__.note = dn;
}

function showLoadError(triedUrl, err) {
  const hint = err && err.message ? String(err.message) : "";
  const esc = (s) => String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/"/g, "&quot;");
  document.getElementById("cat-bar").innerHTML =
    `<div class="state-err" style="padding:14px 24px">
       ⚠️ 无法通过网页地址加载数据<br>
       <small style="display:block;margin-top:8px;line-height:1.6">
         已尝试：<code style="word-break:break-all">${esc(triedUrl)}</code><br>
         ${hint ? `原因：${esc(hint)}<br>` : ""}
         <strong>做法 1</strong>：在项目目录执行 <code>python3 -m http.server 8765</code>，浏览器打开
         <code>http://localhost:8765/选品分析报告_v3.html</code>（与 JSON 同目录即可）<br>
         <strong>做法 2</strong>：点击下方按钮选择刚生成的 <code>${esc(JSON_BASENAME)}</code>
       </small>
       <label class="btn-generate" style="display:inline-block;margin-top:12px;cursor:pointer">
         选择 JSON 文件
         <input type="file" accept=".json,application/json" style="display:none" id="json-file-input">
       </label>
     </div>`;
  document.getElementById("content").innerHTML =
    `<div class="state-err">缺少可读取的热度数据。请确认已运行 <code>fmcg_analysis_v3.py</code> 并选择输出的 JSON。</div>`;
  document.getElementById("sidebar").innerHTML = "";
  const inp = document.getElementById("json-file-input");
  if (inp) {
    inp.addEventListener("change", () => {
      const f = inp.files && inp.files[0];
      if (!f) return;
      const r = new FileReader();
      r.onload = async () => {
        try {
          DATA = JSON.parse(r.result);
          try {
            const pr = await fetch(resolveStaticPredFetchUrlBusted(), { cache: "no-store" });
            await applyStaticPredFetchResponse(pr);
            hydrateSkuPredictionsFromData();
          } catch (e3) {}
          init();
        } catch (e2) {
          alert("JSON 解析失败：" + e2.message);
        }
      };
      r.readAsText(f, "UTF-8");
    });
  }
}

// ── 入口 ──────────────────────────────────────────
async function loadData() {
  // Streamlit 嵌入场景：优先使用内嵌数据，避免同源 fetch 失败导致一直“加载中”
  if (window.__EMBEDDED_DATA__) {
    DATA = window.__EMBEDDED_DATA__;
    try {
      const pr = await fetch(resolveStaticPredFetchUrlBusted(), { cache: "no-store" });
      await applyStaticPredFetchResponse(pr);
    } catch (e) {}
    hydrateSkuPredictionsFromData();
    init();
    return;
  }
  const fetchUrl = resolveJsonFetchUrl();
  const predUrlBust = resolveStaticPredFetchUrlBusted();
  try {
    const [resp, predResp] = await Promise.all([
      fetch(fetchUrl),
      fetch(predUrlBust, { cache: "no-store" }).catch(() => ({ ok: false })),
    ]);
    if (!resp.ok) throw new Error(`HTTP ${resp.status} ${resp.statusText || ""}`.trim());
    DATA = await resp.json();
    await applyStaticPredFetchResponse(predResp);
    hydrateSkuPredictionsFromData();
    init();
  } catch (e) {
    showLoadError(fetchUrl, e);
  }
}

function visibleCategories() {
  return (DATA.categories || []).filter((c) => !HIDDEN_CATEGORIES.has(c));
}

// ── 初始化 ─────────────────────────────────────────
function init() {
  document.getElementById("gen-time").textContent = "数据生成于 " + DATA.generated_at;

  const cats = visibleCategories();
  const bar = document.getElementById("cat-bar");
  if (!cats.length) {
    bar.innerHTML = `<div class="state-msg" style="padding:14px 24px">没有可展示的品类数据</div>`;
    document.getElementById("sidebar").innerHTML = "";
    document.getElementById("content").innerHTML = `<div class="state-msg">请检查 JSON 中的 categories</div>`;
    return;
  }

  bar.innerHTML = cats.map((cat, i) =>
    `<button class="cat-btn ${i===0?"active":""}" onclick="switchCat('${cat}',this)">${cat}</button>`
  ).join("");

  switchCat(cats[0], bar.querySelector(".cat-btn.active"));
  void prefetchLocalLlmConfigFromDisk();
}

// ── 品类切换 ───────────────────────────────────────
function switchCat(cat, btn) {
  document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  CURRENT_CAT = cat;
  CURRENT_BODY_BRAND_FILTER = "__ALL__";
  renderSidebar(cat);
  renderContent(cat);
}

// ── 侧边栏 ─────────────────────────────────────────
function renderSidebar(cat) {
  const snap    = DATA.snapshots[cat] || {};
  const tf      = snap.top_flavor || null;
  const tbRaw   = snap.top_body   || null;
  const tb      = (tbRaw && String(tbRaw.tag || "").includes("外卖")) ? null : tbRaw;
  const tp     = snap.top_price     || null;  // 热度评分最高（增长潜力）
  const tp_vol = snap.top_price_vol || null;  // 销量PSD最高（当前销量最大）
  const flavors = snap.flavors    || [];
  const blanks  = (DATA.heat || [])
    .filter(r => r.cat === cat && r.signal === "⚡ 高需低供")
    .filter(r => ["口味", "商品主体", "价格带"].includes(r.dim))
    .filter(r => !/^\d+(\.\d+)?$/.test(String(r.tag || "").trim()))
    .sort((a, b) => b.score - a.score)
    .slice(0, 8);

  const card = (cls, label, val, sub) =>
    `<div class="data-card ${cls}">
       <div class="data-card-label">${label}</div>
       <div class="data-card-val">${val}</div>
       <div class="data-card-sub">${sub}</div>
     </div>`;

  let html = `<div class="sidebar-label">数据快照</div>`;
  if (tf) html += card("hot",  "TOP 口味 · 综合热度",  tf.tag, `热度 ${(tf.score*100).toFixed(0)} · 时间趋势 ${tf.trend}`);
  if (tb) html += card("rise", "TOP 主体 · 热度增长",  tb.tag, `热度 ${(tb.score*100).toFixed(0)} · PSD ${tb.psd.toFixed(2)}`);
  if (tp) html += card(
    tp.level && tp.level.includes("高热") ? "hot" : "rise",
    "价格带 · 增长潜力",
    tp.tag,
    `热度 ${(tp.score*100).toFixed(0)} · 时间趋势 ${tp.trend} · 转化率 ${(tp.conv*100).toFixed(0)}%`
  );
  if (tp_vol && tp_vol.tag !== (tp && tp.tag)) html += card(
    "cold",
    "价格带 · 当前销量最大",
    tp_vol.tag,
    `销量PSD ${tp_vol.psd.toFixed(2)} · 热度 ${(tp_vol.score*100).toFixed(0)}${tp_vol.level && tp_vol.level.includes("冷淡") ? " ⚠️热度下滑" : ""}`
  );

  if (flavors.length) {
    html += `<hr class="divider"><div class="sidebar-label">口味热度分布</div>
             <div class="tag-list" id="flavor-bars"></div>`;
  }
  if (blanks.length) {
    html += `<hr class="divider"><div class="sidebar-label">空白机会信号</div>
             <div>${blanks.map(b => `<span class="signal hot">⚡ ${b.dim}·${b.tag}</span>`).join("")}</div>
             <div style="font-size:0.72rem;color:var(--muted);margin-top:8px;">高销量PSD但SKU数量少，供给不足</div>`;
  }

  document.getElementById("sidebar").innerHTML = html;

  if (flavors.length) {
    const maxScore = Math.max(...flavors.map(f => f.score), 0.01);
    document.getElementById("flavor-bars").innerHTML = flavors.map(f => {
      const pct   = (f.score / maxScore * 100).toFixed(1);
      const color = f.score >= 0.75 ? "#c8401a" : f.score >= 0.5 ? "#d4700a" : f.score >= 0.25 ? "#2d6a4f" : "#9e9e9e";
      const label = f.name || f.tag || "";
      return `<div class="tag-row">
        <span class="tag-name" title="${label}">${label}</span>
        <div class="tag-bar-wrap"><div class="tag-bar" data-w="${pct}" style="width:0%;background:${color}"></div></div>
        <span class="tag-score">${(f.score*100).toFixed(0)}</span>
      </div>`;
    }).join("");
    setTimeout(() => {
      document.querySelectorAll(".tag-bar").forEach(b => b.style.width = b.dataset.w + "%");
    }, 300);
  }
}

/** 品牌筛查：不展示含壹度、安哒、安达（含安哒宝焙、壹度定制等）的选项 */
function isExcludedBrandForFilter(brand) {
  return /壹度|安哒|安达/.test(String(brand || "").trim());
}

// ── 主内容区 ───────────────────────────────────────
function renderContent(cat) {
  const allRaw  = DATA.heat.filter(r => r.cat === cat);
  // 主体里含“外卖”属于噪声标签，统一不展示
  const all = allRaw.filter(r => !(r.dim === "商品主体" && String(r.tag || "").includes("外卖")));
  const flavors = all.filter(r => r.dim === "口味").sort((a,b) => b.score - a.score);
  const bodyAll = all.filter(r => r.dim === "商品主体").sort((a,b) => b.score - a.score);
  if (CURRENT_BODY_BRAND_FILTER !== "__ALL__" && isExcludedBrandForFilter(CURRENT_BODY_BRAND_FILTER)) {
    CURRENT_BODY_BRAND_FILTER = "__ALL__";
  }
  const brandOptions = [...new Set(bodyAll.map(r => (r.brand || "").trim()).filter(Boolean))]
    .filter((b) => !isExcludedBrandForFilter(b))
    .sort((a, b) => a.localeCompare(b, "zh-Hans-CN"));
  const bodies  = CURRENT_BODY_BRAND_FILTER === "__ALL__"
    ? bodyAll
    : bodyAll.filter(r => (r.brand || "").trim() === CURRENT_BODY_BRAND_FILTER);
  const prices  = all.filter(r => r.dim === "价格带").sort((a,b) => b.score - a.score);
  const specs   = all.filter((r) => r.dim === "规格数值");
  const blanks  = all
    .filter(r => r.signal === "⚡ 高需低供")
    .filter(r => ["口味", "商品主体", "价格带"].includes(r.dim))
    .filter(r => !/^\d+(\.\d+)?$/.test(String(r.tag || "").trim()));
  // 待验证：仅看口味（不含价格带/主体）
  const watchPool = blanks.filter(r => r.cat === cat && r.dim === "口味");
  const cold    = all.filter(r => r.level.includes("冷淡"));

  const badge = r => {
    // 01 模块按 level 展示“热度层级”
    if (r.signal === "⚡ 高需低供") return `<span class="signal hot">⚡ 高需低供</span>`;
    if (r.level.includes("高热"))   return `<span class="signal hot">🔥 高热</span>`;
    if (r.level.includes("上升"))   return `<span class="signal rise">✅ 接受中</span>`;
    if (r.level.includes("平稳"))   return `<span class="signal blank">➡️ 平稳</span>`;
    return `<span class="signal cold">❄️ 冷淡</span>`;
  };

  const trs = (rows, cols) => rows.slice(0,12).map(r => {
    const cells = cols.map(c => {
      if (c==="tag")       return `<td>${r.tag}</td>`;
      if (c==="sku")       return `<td class="num">${r.sku}</td>`;
      if (c==="psd")       return `<td class="num">${r.psd.toFixed(3)}</td>`;
      if (c==="conv")      return `<td class="num">${(r.conv*100).toFixed(0)}%</td>`;
      if (c==="margin")    return `<td class="num">${(r.margin*100).toFixed(1)}%</td>`;
      if (c==="total_qty") return `<td class="num">${r.total_qty.toLocaleString()}</td>`;
      if (c==="signal")    return `<td>${badge(r)}</td>`;
      return `<td>${r[c]}</td>`;
    }).join("");
    return `<tr>${cells}</tr>`;
  }).join("");
  const trsAll = (rows, cols) => rows.map(r => {
    const cells = cols.map(c => {
      if (c==="tag")       return `<td>${r.tag}</td>`;
      if (c==="sku")       return `<td class="num">${r.sku}</td>`;
      if (c==="psd")       return `<td class="num">${r.psd.toFixed(3)}</td>`;
      if (c==="conv")      return `<td class="num">${(r.conv*100).toFixed(0)}%</td>`;
      if (c==="margin")    return `<td class="num">${(r.margin*100).toFixed(1)}%</td>`;
      if (c==="total_qty") return `<td class="num">${r.total_qty.toLocaleString()}</td>`;
      if (c==="signal")    return `<td>${badge(r)}</td>`;
      return `<td>${r[c]}</td>`;
    }).join("");
    return `<tr>${cells}</tr>`;
  }).join("");

  const flavorTbl = flavors.length
    ? `<table class="data-table">
         <thead><tr><th>口味标签</th><th>SKU数</th><th>均销量PSD</th><th>铺货转化率</th><th>信号</th></tr></thead>
         <tbody>${trs(flavors, ["tag","sku","psd","conv","signal"])}</tbody>
       </table>`
    : `<p style="color:var(--muted)">暂无口味标签数据</p>`;

  const bodyFilter = `<div class="table-tools">
      <label style="font-size:0.75rem;color:var(--muted);margin-right:8px;">品牌筛查</label>
      <select id="body-brand-filter" onchange="onBodyBrandFilterChange(this.value)">
        <option value="__ALL__" ${CURRENT_BODY_BRAND_FILTER === "__ALL__" ? "selected" : ""}>全部品牌</option>
        ${brandOptions.map(b => `<option value="${b}" ${CURRENT_BODY_BRAND_FILTER === b ? "selected" : ""}>${b}</option>`).join("")}
      </select>
    </div>`;
  let bodyRowsForTable = bodies.slice(0, 12);
  if (
    cat === "日配冷藏" &&
    CURRENT_BODY_BRAND_FILTER === "__ALL__" &&
    !bodyRowsForTable.some(r => r.tag === "椰子水")
  ) {
    const coconutRow = bodyAll.find(r => r.tag === "椰子水");
    if (coconutRow) bodyRowsForTable = [...bodyRowsForTable, coconutRow];
  }
  const bodyTbl = bodies.length
    ? `<div style="margin-top:20px">
         ${bodyFilter}
         <table class="data-table">
           <thead><tr><th>商品主体</th><th>SKU数</th><th>均销量PSD</th><th>铺货转化率</th><th>信号</th></tr></thead>
           <tbody>${trsAll(bodyRowsForTable, ["tag","sku","psd","conv","signal"])}</tbody>
         </table></div>` : "";

  // 立即开发：高需低供信号（优先级最高）
  const immediateRows = blanks.slice(0, 4);
  const immediateFlavorTagSet = new Set(
    immediateRows.filter(r => r.dim === "口味").map(r => r.tag)
  );
  const blankTags = immediateRows.map(r =>
    `<span class="signal hot">⚡ ${r.tag}（${r.dim}）</span>`).join("");

  // 价格带：直接用 snap 里已按热度排好的 prices_all
  const snap       = DATA.snapshots[cat] || {};
  const pricesAll  = snap.prices_all || snap.price_list || prices;
  const topPrice   = pricesAll[0] || null;               // 热度评分第一
  const topVolPrice = (snap.top_price_vol) || null;      // 销量最大
  // 已在"价格带增长潜力"里展示的标签，谨慎格不重复出现
  const shownPriceTags = new Set([
    topPrice   && topPrice.tag,
    topVolPrice && topVolPrice.tag,
  ].filter(Boolean));

  // 价格带分布表（全部价格带，按热度排序）
  const priceLevelColor = l =>
    l.includes("高热") ? "var(--hot)" : l.includes("上升") ? "var(--rise)" :
    l.includes("平稳") ? "var(--flat)" : "var(--cold)";
  const priceTable = pricesAll.length ? `
    <table class="data-table" style="margin-top:8px">
      <thead><tr><th>价格带</th><th>热度评分</th><th>时间趋势</th><th>销量PSD</th><th>铺货转化率</th><th>总销量</th><th>SKU</th></tr></thead>
      <tbody>${pricesAll.map(p => `<tr>
        <td><strong>${p.tag}</strong></td>
        <td class="num" style="color:${priceLevelColor(p.level)};font-weight:700">${(p.score*100).toFixed(0)}</td>
        <td>${p.trend}</td>
        <td class="num">${p.psd.toFixed(3)}</td>
        <td class="num">${(p.conv*100).toFixed(0)}%</td>
        <td class="num">${(p.total_qty||0).toLocaleString()}</td>
        <td class="num">${p.sku||"—"}</td>
      </tr>`).join("")}</tbody>
    </table>` : "<p style='color:var(--muted)'>暂无价格带数据</p>";

  const topSpec = pickDraftDimRow(specs);
  // 单位必须来自该规格值的实际计算来源（主体/规格单位），不按大类猜测
  const topSpecUnit = topSpec ? String(topSpec.spec_unit || "").trim() : "";
  const topSpecSourceBody = topSpec ? String(topSpec.spec_source_body || "").trim() : "";
  const topSpecUnitMixed = !!(topSpec && topSpec.spec_unit_mixed);
  const topSpecLabel = topSpec
    ? `${topSpec.tag}${topSpecUnit ? topSpecUnit : ""}`
    : "";
  // 谨慎格：冷淡价格带，排除已在"增长潜力"和"当前销量"中展示过的
  const coldPrices = pricesAll
    .filter(p => p.level && p.level.includes("冷淡") && !shownPriceTags.has(p.tag));
  // 谨慎口味（非价格带）
  const cautionFlavor = cold
    .filter(r => r.cat === cat && r.dim === "口味")
    .slice(0, 3)
    .map(r => r.tag);
  const cautionPriceDesc = coldPrices.length
    ? `价格带中热度偏低（转化率低、趋势下滑）：${coldPrices.map(p => p.tag).join("、")}`
    : "";
  const cautionOtherParts = [];
  if (cautionFlavor.length) cautionOtherParts.push(`口味“${cautionFlavor.join("、")}”`);
  // 立即开发中的口味不可再进入谨慎引进
  const cautionFlavorFiltered = cautionFlavor.filter(t => !immediateFlavorTagSet.has(t));
  const cautionOtherDesc = cautionFlavorFiltered.length
    ? `口味“${cautionFlavorFiltered.join("、")}”：消费者接受度偏低，谨慎引进` : "";
  const cautionFlavorSet = new Set(cautionFlavorFiltered);

  // 待验证：先取高需低供口味（与“立即开发/谨慎引进”去重）
  let watchRows = watchPool
    .filter(r => !immediateFlavorTagSet.has(r.tag))
    .filter(r => !cautionFlavorSet.has(r.tag))
    .sort((a, b) => {
      const convA = Number(a.conv || 0), convB = Number(b.conv || 0);
      if (convB !== convA) return convB - convA;
      return Number(b.total_qty || 0) - Number(a.total_qty || 0);
    })
    .slice(0, 6);
  // 若为空：补充“非高需低供但有一定转化”的口味，避免多个品类待验证长期为空
  if (!watchRows.length) {
    watchRows = flavors
      .filter(r => !immediateFlavorTagSet.has(r.tag))
      .filter(r => !cautionFlavorSet.has(r.tag))
      .filter(r => r.signal !== "⚡ 高需低供")
      .filter(r => Number(r.conv || 0) >= 0.2 && Number(r.total_qty || 0) > 0)
      .sort((a, b) => {
        const convA = Number(a.conv || 0), convB = Number(b.conv || 0);
        if (convB !== convA) return convB - convA;
        return Number(a.total_qty || 0) - Number(b.total_qty || 0); // 偏向“量级小但可试验”
      })
      .slice(0, 6);
  }
  const watchFlavor = watchRows.map(r => r.tag);
  const watchTags = watchFlavor.length ? `口味“${watchFlavor.join("、")}”` : "—";

  const recentNews = RECENT_NEWS_BY_CAT[cat] || ["本品类暂无近期资讯。"];
  const recentNewsHtml = recentNews.map(n => `<p style="margin-bottom:10px">- ${n}</p>`).join("");

  const draftSku = computeDraftSku(cat);
  const predDraftLine =
    `数据初稿：主体 <strong>${escHtml(draftSku.bodyTag)}</strong> · 规格 <strong>${escHtml(draftSku.specLabel)}</strong> · 口味 <strong>${escHtml(draftSku.flavorTag)}</strong> · 价格带 <strong>${escHtml(draftSku.priceTag)}</strong>`;

  document.getElementById("content").innerHTML = `
  <div class="fade-in">
    <div class="section-head">
      <span class="section-num">01</span>
      <span class="section-title">已验证：哪些特征正在被消费者接受中</span>
    </div>
    <div class="section-body">
      ${flavorTbl}
      ${bodyTbl}
    </div>

    <div class="section-head">
      <span class="section-num">02</span>
      <span class="section-title">空白机会：高热标签 × 低供给</span>
    </div>
    <div class="section-body">
      <div class="matrix">
        <div class="matrix-trend-pair">
          <div class="matrix-cell highlight">
            <div class="matrix-cell-title">🔥 趋势方向</div>
            <p>高销量PSD + SKU数量少，消费者有需求但货架供给不足</p>
            <div style="margin-top:10px">${blankTags || "<span style='color:var(--muted);font-size:0.8rem'>暂无高需低供信号</span>"}</div>
          </div>
          <div class="matrix-cell highlight">
            <div class="matrix-cell-title">🔮 研发预测商品</div>
            <div class="pred-mini" id="pred-draft-line">${predDraftLine}</div>
            <div class="pred-static-head" id="pred-static-head"></div>
            <div class="pred-out" id="pred-llm-out" style="display:none"></div>
            <div class="pred-static-note" id="pred-static-badge"></div>
            <div class="pred-tools" id="pred-tools-wrap">
              <input type="password" id="sku-pred-api-key" placeholder="DashScope（千问）或 Anthropic API Key" autocomplete="off">
              <button type="button" class="btn-pred" id="btn-sku-pred" onclick="generateSkuPrediction()">生成预测</button>
              <button type="button" class="btn-pred btn-pred-secondary" onclick="copyPredictionJsonLineForPages()">复制本品类 JSON 一行</button>
              <p style="flex-basis:100%;margin:4px 0 0;font-size:0.72rem;color:var(--muted);line-height:1.55">给客户看 GitHub Pages：各品类生成后点「复制 JSON 一行」→ 打开仓库里 <code>sku_predictions_static.json</code> → 粘到 <code>by_cat</code> 里（每行末尾逗号，最后一项不要逗号）→ 保存后 <code>git push</code>。</p>
            </div>
          </div>
        </div>
        <div class="matrix-cell highlight" style="grid-column:1/-1">
          <div class="matrix-cell-title">📦 价格带热度分布${topSpec ? "（最优规格值：" + topSpecLabel + "）" : ""}</div>
          <p style="font-size:0.78rem;color:var(--muted);margin-bottom:4px">
            按热度评分排序，分值越高代表该价格带增长趋势越好、地域接受度越广。销量PSD反映实际需求量级，两者结合判断引进方向。
          </p>
          ${priceTable}
        </div>
        <div class="matrix-cell">
          <div class="matrix-cell-title grey">🧪 待验证</div>
          <p>${watchTags !== "—" ? `${watchTags}：已具备一定转化基础，但需求规模仍小，建议小批量试验并观察复购` : "暂无待验证信号"}</p>
        </div>
        <div class="matrix-cell">
          <div class="matrix-cell-title grey">❄️ 谨慎引进</div>
          <p style="line-height:1.8">
            ${cautionPriceDesc ? cautionPriceDesc + "<br>" : ""}
            ${cautionOtherDesc || (cautionPriceDesc ? "" : "暂无明显冷淡标签")}
          </p>
        </div>
      </div>
    </div>

    <div class="section-head">
      <span class="section-num">03</span>
      <span class="section-title">近期资讯</span>
    </div>
    <div class="section-body">
      <div class="report-box" id="report-box">
        ${recentNewsHtml}
      </div>
      <!-- 临时停用 AI 生成按钮（暂无 API 调用） -->
      <!-- <button class="btn-generate" id="btn-generate" onclick="generateReport()">生成 AI 选品建议</button> -->
    </div>
  </div>`;

  applyStaticSkuPredictionIfAny(cat);
}

/** 若已加载 sku_predictions_static.json 且含当前品类，则只读展示并隐藏 API 输入区（GitHub Pages 方案 A） */
function applyStaticSkuPredictionIfAny(cat) {
  const out = document.getElementById("pred-llm-out");
  const wrap = document.getElementById("pred-tools-wrap");
  const badge = document.getElementById("pred-static-badge");
  const head = document.getElementById("pred-static-head");
  const keyInput = document.getElementById("sku-pred-api-key");
  if (!out || !wrap || !badge) return;
  const meta = window.__STATIC_SKU_PRED_META__;
  const map = STATIC_SKU_PRED_BY_CAT;
  out.classList.remove("is-static");
  badge.classList.remove("visible");
  badge.textContent = "";
  if (head) {
    head.classList.remove("visible");
    head.textContent = "";
  }
  wrap.classList.remove("is-hidden");
  const raw = map && Object.prototype.hasOwnProperty.call(map, cat) ? map[cat] : null;
  const text = raw != null ? String(raw).trim() : "";
  if (text) {
    out.style.display = "block";
    out.textContent = text;
    out.classList.add("is-static");
    wrap.classList.add("is-hidden");
    if (head) {
      head.textContent = "📌 预生成「商品预测」全文（优先展示「sku_predictions_static.json」中本品类；若仅有热度 JSON 内 sku_predictions_by_cat 亦可）";
      head.classList.add("visible");
    }
    let note =
      "本品类为预生成演示文案，访问方无需 API。更新请替换仓库内「" + STATIC_PRED_BASENAME + "」中对应品类。";
    if (meta && meta.generated_at) note = "预生成时间：" + meta.generated_at + "。" + note;
    if (meta && meta.note) note = String(meta.note).trim() + " " + note;
    badge.textContent = note;
    badge.classList.add("visible");
    return;
  }
  out.style.display = "none";
  out.textContent = "";
  if (keyInput) {
    const sk = sessionStorage.getItem("sku_pred_key_cache") || sessionStorage.getItem("anthropic_key_sku");
    const localK =
      typeof window.__LOCAL_ANTHROPIC_KEY__ === "string" ? window.__LOCAL_ANTHROPIC_KEY__.trim() : "";
    if (sk) keyInput.value = sk;
    else if (localK) keyInput.placeholder = "已使用 local_settings.js 中的密钥，可直接点生成";
  }
}

function escHtml(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/"/g, "&quot;");
}

/** 解析价格带标签（与 fmcg_analysis_v3.PRICE_LABELS 分箱文案一致），得到大致元价位，用于剔除统计极端档 */
function parsePriceBandMeta(tag) {
  const s = String(tag || "");
  let low = 0;
  let high = 9999;
  const mRange = s.match(/([\d.]+)\s*[-–]\s*([\d.]+)\s*元/);
  const mLe = s.match(/≤\s*([\d.]+)/);
  const mPlus = s.match(/([\d.]+)\s*元\+/) || s.match(/([\d.]+)\s*元\s*以上/);
  if (mLe) {
    low = 0;
    high = parseFloat(mLe[1]) || 3;
  } else if (mRange) {
    low = parseFloat(mRange[1]) || 0;
    high = parseFloat(mRange[2]) || low;
  } else if (mPlus) {
    low = parseFloat(mPlus[1]) || 20;
    high = 9999;
  } else {
    const nums = s.match(/[\d.]+/g);
    if (nums && nums.length >= 2) {
      low = parseFloat(nums[0]) || 0;
      high = parseFloat(nums[1]) || low;
    } else if (nums && nums.length === 1) {
      low = parseFloat(nums[0]) || 0;
      high = low + 1;
    }
  }
  const mid = (low + high) / 2;
  return { low, high, mid };
}

function bandMidFromPriceRow(row) {
  return parsePriceBandMeta(row && row.tag).mid;
}

/** 通识：在「销量领先」的价带子集里去掉统计上最易误导的两端，再按热度择优（跨品类，不依赖饮料特例） */
function pickDraftPriceRowFromList(pricesAll) {
  if (!pricesAll || !pricesAll.length) return null;
  const byVol = [...pricesAll].sort(
    (a, b) => (Number(b.total_qty) || 0) - (Number(a.total_qty) || 0)
  );
  const k = Math.min(6, byVol.length);
  const slice = byVol.slice(0, k);
  const sortByHeat = (rows) =>
    [...rows].sort((a, b) => {
      const ds = (Number(b.score) || 0) - (Number(a.score) || 0);
      if (ds !== 0) return ds;
      return (Number(b.psd) || 0) - (Number(a.psd) || 0);
    });
  if (slice.length <= 2) return sortByHeat(slice)[0];

  let minMid = Infinity;
  let maxMid = -Infinity;
  slice.forEach((r) => {
    const m = bandMidFromPriceRow(r);
    if (m < minMid) minMid = m;
    if (m > maxMid) maxMid = m;
  });
  if (Math.abs(maxMid - minMid) < 1e-6) return sortByHeat(slice)[0];

  const minRows = slice.filter((r) => bandMidFromPriceRow(r) === minMid);
  const maxRows = slice.filter((r) => bandMidFromPriceRow(r) === maxMid);
  const dropMin = [...minRows].sort(
    (a, b) => (Number(a.score) || 0) - (Number(b.score) || 0)
  )[0];
  const dropMax = [...maxRows].sort(
    (a, b) => (Number(a.score) || 0) - (Number(b.score) || 0)
  )[0];
  let pool = slice.filter((r) => r !== dropMin && r !== dropMax);
  if (!pool.length) pool = slice;
  return sortByHeat(pool)[0];
}

/** 仅对「克」规格：过小克重多为单粒/口香糖等，不宜作为「最优规格」代表整类主力结构 */
function specGramRepresentFactor(r) {
  const u = String(r.spec_unit || "").trim().toLowerCase();
  if (u !== "g") return 1;
  const n = parseFloat(String(r.tag || "").trim().replace(/,/g, ""));
  if (!Number.isFinite(n) || n <= 0) return 1;
  if (n < 10) return 0.38;
  if (n < 20) return 0.72;
  if (n < 35) return 0.9;
  return 1;
}

/** 混单位聚合行更易在评分上冒尖，与「单一清晰规格」展示口径不一致 */
function specMixedUnitFactor(r) {
  return r.spec_unit_mixed ? 0.82 : 1;
}

/**
 * 口味 / 商品主体 / 规格数值：在「热度前几」子集中剔除 SKU 数异常偏低的尾项，再择优（通识，不针对单一毫升）。
 * 避免少数 SKU、小众规格仅靠评分占第一就盖住大盘。
 */
function pickDraftDimRow(rows) {
  if (!rows || !rows.length) return null;
  const skuN = (r) => Math.max(0, Number(r.sku) || 0);
  const scoreN = (r) => Number(r.score) || 0;
  const K = Math.min(15, rows.length);
  const topByScore = [...rows].sort((a, b) => scoreN(b) - scoreN(a)).slice(0, K);
  const maxSku = Math.max(...topByScore.map(skuN), 1);
  let minSkuOk = Math.max(3, Math.ceil(maxSku * 0.06));
  let qualified = topByScore.filter((r) => skuN(r) >= minSkuOk);
  if (qualified.length < 2) {
    minSkuOk = Math.max(2, Math.ceil(maxSku * 0.035));
    qualified = topByScore.filter((r) => skuN(r) >= minSkuOk);
  }
  if (!qualified.length) qualified = topByScore;
  const maxScore = Math.max(...qualified.map(scoreN), 1e-9);
  const skuWeight = 0.15;
  const blend = (r) =>
    (scoreN(r) / maxScore + skuWeight * (skuN(r) / maxSku)) *
    specGramRepresentFactor(r) *
    specMixedUnitFactor(r);
  return [...qualified].sort((a, b) => {
    const db = blend(b) - blend(a);
    if (Math.abs(db) > 1e-9) return db > 0 ? 1 : -1;
    const dr = (Number(b.regions) || 0) - (Number(a.regions) || 0);
    if (dr !== 0) return dr > 0 ? 1 : -1;
    return (Number(b.total_qty) || 0) - (Number(a.total_qty) || 0);
  })[0];
}

function computeDraftSku(cat) {
  if (!DATA || !cat) {
    return {
      bodyTag: "—",
      specLabel: "—",
      flavorTag: "—",
      priceTag: "—",
      bodyBrand: "",
      hadBodyBrandCluster: false,
      priceHeatTag: null,
    };
  }
  const allRaw = DATA.heat.filter((r) => r.cat === cat);
  const all = allRaw.filter((r) => !(r.dim === "商品主体" && String(r.tag || "").includes("外卖")));
  const flavors = all.filter((r) => r.dim === "口味");
  const bodyAll = all.filter((r) => r.dim === "商品主体");
  const bodies =
    CURRENT_BODY_BRAND_FILTER === "__ALL__"
      ? bodyAll
      : bodyAll.filter((r) => (r.brand || "").trim() === CURRENT_BODY_BRAND_FILTER);
  const prices = all.filter((r) => r.dim === "价格带").sort((a, b) => b.score - a.score);
  const snap = DATA.snapshots[cat] || {};
  const pricesAll = snap.prices_all || snap.price_list || prices;
  const specs = all.filter((r) => r.dim === "规格数值");
  const f = pickDraftDimRow(flavors);
  const b = pickDraftDimRow(bodies);
  const s = pickDraftDimRow(specs);
  const specLabel = s ? `${s.tag}${String(s.spec_unit || "").trim()}` : "—";

  const topHeat = pricesAll.length ? pricesAll[0] : null;
  const pricePick = pricesAll.length ? pickDraftPriceRowFromList(pricesAll) : null;
  const finalPick = pricePick || topHeat;

  const priceTag = finalPick ? finalPick.tag : "—";
  const priceHeatTag = topHeat && finalPick && topHeat.tag !== priceTag ? topHeat.tag : null;

  return {
    flavorTag: f ? f.tag : "—",
    bodyTag: b ? b.tag : "—",
    bodyBrand: b ? String(b.brand || "").trim() : "",
    hadBodyBrandCluster: !!(b && String(b.brand || "").trim()),
    priceTag,
    specLabel: specLabel || "—",
    priceHeatTag,
  };
}

**肉制品、烤肠、即食肠类（当【数据初稿】主体为烤肠/香肠/脆骨肠等时须遵守）**：黑胡椒、芝士、玉米、奥尔良等味型常见，但表述须符合**肉制品工业习惯**（调味、颗粒、灌芯、爆汁等）。**禁止**把烘焙甜品式的「××流心」与多种味型名词**硬堆成一款**离奇口号（例如「黑椒芝士流心烤肠」式多重不兼容叙事）；若需「增量」，优先**场景、规格、清洁标签、减盐、部位肉质表述**等，而非虚构甜点化结构。

**【预测商品】的定位与排除（须遵守）**：【预测商品】须指向**仍有开品与企划讨论价值**的方向（风味延展、在货架已有先例的结构/质地微调、场景与规格×价位新组合、清洁标签/减负担改版等）。**禁止**把渠道里**已高度成熟、多年常态渗透**的「基准款」「原味/本味占主导的常规单品形态」当作**唯一**预测结论——例如通篇仅写「只做原味薯片、再无别的」这类**完全无讨论空间**的表述；但**允许**在承认基准盘的前提下，写出**带明确增量且仍合常识**的方向（如双味、区域味、减油减盐、规格带微调、场景限定等）。**禁止**靠堆砌**非常规多层结构词**（滥用「流心」「夹层」等）凑「增量」而违背品类基本形态常识。若【数据初稿】落在成熟基准上，【四要素】与【预测商品】须在**不编造离奇结构**的前提下迁向可立项增量，并在【修正说明】中交代依据。

**标签与规格的通识（跨品类，须遵守）**：统计「热度」来自多指标合成，**不等于**「市场上最常见、最值得跟进的单品形态」。SKU 很少的标签往往在热度上不稳定，不宜直接代表品类主力；你必须结合【品类】判断初稿的主体、口味、规格是否代表**大众日常货架的主力结构**。若初稿明显小众或与常识冲突，**在【四要素】中给出更合理的通用表述**（仍不得写品牌），并在【修正说明】中写明依据。

**价格与规格的通识（跨品类，须遵守）**：统计上的「价格带」来自分箱汇总，**不等于**某一具体 SKU 的合理零售价。极端低价档往往对应引流品、尾量结构或少数 SKU；极端高价档常见礼盒、多支组合、大毫升/大克重、短保或高附加值形态。你必须结合【品类】+【商品主体】+【规格数值】所隐含的**典型购买单元**（单支/单包/单瓶等），判断初稿价带是否代表「大众日常可接受的主力价」；若明显违背常识（例如常规单件即饮/单包零食却落在统计上的最高档等），**在【四要素】中给出符合市场规律的价格带表述**，并在【修正说明】首句写明「初稿价带仅作数据参考，已按品类常识校正」。

**酒类与酒精饮品常识（当【品类】为「酒类」或【四要素】出现啤酒/葡萄酒/黄酒/洋酒/白酒/预调酒等时须遵守）**：**酒精度、工艺与品类名称必须一致**，不得出现与真实货架与理化常识冲突的表述。**严禁**把典型**低度**的啤酒写成与白酒、伏特加同档的**高度数**（例如「四十多度的啤酒」「42°啤酒」等一律视为不合格）；若初稿或联想中出现此类错位，必须在【四要素】与【预测商品】中**按正确酒种与常见酒精度带改写**，并在【修正说明】中点明已校正。**葡萄酒、洋酒（威士忌等蒸馏酒）、黄酒、白酒、预调酒**各自的风味逻辑、常见装瓶与度数表述不得混用——不得把只适合某一酒种的叙事硬套到另一酒种。**口味×酒种**须对齐**市场上真实存在的组合与工艺路径**（如啤酒侧：麦香、酒花、小麦/白啤、黑啤、IPA、常见果香增味等；葡萄酒侧：品种与典型风格方向等），禁止为追热点编造与同品类常识明显矛盾的商品定义。

**硬性约束（违反视为不合格）**：在【预测商品】【四要素】【市场热度归纳】【修正说明】四处正文中，**一律不得出现**任何品牌名、商标、企业名、渠道代号，以及「××##」式掩码品牌；不得用可识别到具体公司的昵称。主体、场景、渠道仅用**通用品类/业态**表述（如「便利店鲜食」「常见烘焙连锁」等无识别指向说法）。**品类温层**：【品类】名称中的**常温 / 冷藏 / 冷冻 / 日配**等语义须与【预测商品】的**贮藏条件、渠道陈列与供应链前提**一致——**常温乳品不得主推冷藏即饮鲜奶、冷柜短保鲜奶类**；「日配冷藏」类不宜把仅适合常温长途贩运的企划当作冷柜主力替代。**「方便速食」**（名称未含冷藏日配时）**不得**将主推写成**日配冷藏冷柜鲜食面**等错位场景。**不得输出明显不可食用、非食品可实现、或与该品类基本属性（甜咸边界、馅心结构、酒种与酒精度等）明显矛盾的味型×主体结构**。**酒类相关输出不得出现酒精度与酒种错位、或与该酒种工艺常识明显矛盾的基本错误**（如高度数啤酒）。${brandClusterHint}

**时间与「资讯/数据」表述（须遵守）**：以 **2026 年** 为当前时点。凡涉及市场、渠道、动销、研报、统计口径的**时间锚点**，**不得早于 2025 年**——不得写出 **2024、2023 及更早** 的年份或「2024年Q1/Q2」「去年」「前年」等作为**事实性引用**。**禁止编造**带具体年份、季度、百分比的所谓公开数据（例如「（2024年Q2冷链饮品动销数据显示该规格占…68%）」这类句式一律不得出现）。若无法给出可在 **2025–2026** 语境下成立的表述，只写**方向性、非量化**的趋势，并标「（行业推断）」。

/** 去掉首尾空白、隐形字符、误粘贴的引号 */
function normalizeLlmApiKey(raw) {
  if (raw == null) return "";
  let s = String(raw).trim();
  s = s.replace(/^["'「」]+|["'「」]+$/g, "");
  s = s.replace(/[\u200B-\u200D\uFEFF]/g, "");
  s = s.replace(/\s+/g, "");
  return s;
}

/** 从 local_settings.js 文本解析密钥与线路（Qwen / Anthropic） */
function applyLocalLlmFromFetchedText(t) {
  window.__LOCAL_LLM_CONFIG_EMPTY__ = false;
  const pick = (name) => {
    let m = t.match(new RegExp("window\\." + name + "\\s*=\\s*\"([^\"]*)\""));
    if (!m) m = t.match(new RegExp("window\\." + name + "\\s*=\\s*'([^']*)'"));
    return m ? m[1] : null;
  };
  const q = pick("__QWEN_API_KEY__");
  const d = pick("__DASHSCOPE_API_KEY__");
  const a = pick("__LOCAL_ANTHROPIC_KEY__");
  const prov = pick("__LLM_PROVIDER__");
  const model = pick("__QWEN_MODEL__");
  if (q != null && !normalizeLlmApiKey(q) && t.includes("__QWEN_API_KEY__")) window.__LOCAL_LLM_CONFIG_EMPTY__ = true;
  if (q != null && normalizeLlmApiKey(q)) window.__QWEN_API_KEY__ = normalizeLlmApiKey(q);
  if (d != null && normalizeLlmApiKey(d)) window.__QWEN_API_KEY__ = window.__QWEN_API_KEY__ || normalizeLlmApiKey(d);
  if (a != null && normalizeLlmApiKey(a)) window.__LOCAL_ANTHROPIC_KEY__ = normalizeLlmApiKey(a);
  else if (a != null && !normalizeLlmApiKey(a) && t.includes("__LOCAL_ANTHROPIC_KEY__")) window.__LOCAL_LLM_CONFIG_EMPTY__ = true;
  if (prov != null && String(prov).trim()) window.__LLM_PROVIDER__ = String(prov).trim().toLowerCase();
  if (model != null && String(model).trim()) window.__QWEN_MODEL__ = String(model).trim();
}

/** 部分环境下 <script src="local_settings.js"> 未执行，再用 fetch 补读 */
async function prefetchLocalLlmConfigFromDisk() {
  window.__LOCAL_ANTHROPIC_KEY_EMPTY_FILE__ = false;
  const hasMem =
    (typeof window.__QWEN_API_KEY__ === "string" && window.__QWEN_API_KEY__.trim()) ||
    (typeof window.__LOCAL_ANTHROPIC_KEY__ === "string" && window.__LOCAL_ANTHROPIC_KEY__.trim());
  if (hasMem) return;
  try {
    const r = await fetch("local_settings.js?v=" + Date.now(), { cache: "no-store" });
    if (!r.ok) return;
    applyLocalLlmFromFetchedText(await r.text());
  } catch (e) {}
}

/** 决定用千问（DashScope）还是 Claude：显式 __LLM_PROVIDER__ > 输入框启发 > 文件里谁有值 */
function resolveSkuPredictionLlm(keyInputEl) {
  const norm = normalizeLlmApiKey;
  const qFile = typeof window.__QWEN_API_KEY__ === "string" ? norm(window.__QWEN_API_KEY__) : "";
  const aFile = typeof window.__LOCAL_ANTHROPIC_KEY__ === "string" ? norm(window.__LOCAL_ANTHROPIC_KEY__) : "";
  const inp = norm(keyInputEl && keyInputEl.value);
  const provRaw = (window.__LLM_PROVIDER__ || "").toLowerCase();
  const sq = norm(sessionStorage.getItem("dashscope_api_key") || "");
  const sa = norm(sessionStorage.getItem("anthropic_key_sku") || sessionStorage.getItem("sku_pred_key_cache") || "");

  if (provRaw === "anthropic") {
    const k = inp || aFile || sa;
    if (k) return { provider: "anthropic", key: k };
  }
  if (provRaw === "qwen") {
    const k = inp || qFile || sq;
    if (k) return { provider: "qwen", key: k };
  }
  if (inp) {
    if (inp.startsWith("sk-ant-api")) return { provider: "anthropic", key: inp };
    return { provider: "qwen", key: inp };
  }
  if (qFile) return { provider: "qwen", key: qFile };
  if (aFile) return { provider: "anthropic", key: aFile };
  if (sq) return { provider: "qwen", key: sq };
  if (sa) return { provider: "anthropic", key: sa };
  return { provider: null, key: "" };
}

async function generateSkuPrediction() {
  const cat = CURRENT_CAT;
  if (!cat || !DATA) return;
  await prefetchLocalLlmConfigFromDisk();
  const out = document.getElementById("pred-llm-out");
  const btn = document.getElementById("btn-sku-pred");
  const keyInput = document.getElementById("sku-pred-api-key");
  const { provider, key } = resolveSkuPredictionLlm(keyInput);
  const prompt = buildSkuPredictionPrompt(cat);
  window.__LAST_SKU_PRED_PROMPT__ = prompt;
  if (!key || !provider) {
    const portHint = location.port ? `:${location.port}` : "";
    const emptyFile = window.__LOCAL_LLM_CONFIG_EMPTY__ || window.__LOCAL_ANTHROPIC_KEY_EMPTY_FILE__;
    window.__LOCAL_ANTHROPIC_KEY_EMPTY_FILE__ = false;
    window.__LOCAL_LLM_CONFIG_EMPTY__ = false;
    alert(
      "未读到可用的 API Key。请在 local_settings.js 中至少配置其一（保存后强制刷新）：\n\n" +
        "· 千问（推荐）：window.__QWEN_API_KEY__ = \"你的DashScope密钥\";\n" +
        "  可选：window.__LLM_PROVIDER__ = \"qwen\";\n" +
        "  密钥在 https://dashscope.console.aliyun.com/apiKey\n\n" +
        "· Claude：window.__LOCAL_ANTHROPIC_KEY__ = \"sk-ant-api…\";\n" +
        "  可选：window.__LLM_PROVIDER__ = \"anthropic\";\n\n" +
        "也可用本页输入框粘贴密钥（sk-ant-api 走 Claude，否则默认走千问）。\n\n" +
        (emptyFile ? "（检测到密钥变量存在但引号内为空，请先保存文件。）\n\n" : "") +
        "本页地址示例：http://127.0.0.1" +
        portHint +
        "/选品分析报告_v3.html"
    );
    return;
  }
  if (provider === "qwen") sessionStorage.setItem("dashscope_api_key", key);
  else sessionStorage.setItem("anthropic_key_sku", key);
  sessionStorage.setItem("sku_pred_key_cache", key);
  sessionStorage.setItem("sku_pred_provider", provider);
  if (out) {
    out.style.display = "block";
    out.textContent = "生成中…";
  }
  if (btn) btn.disabled = true;
  try {
    let text = "";
    if (provider === "qwen") {
      const qModel = (typeof window.__QWEN_MODEL__ === "string" && window.__QWEN_MODEL__.trim()) || "qwen-plus";
      const resp = await fetch("https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: "Bearer " + key,
        },
        body: JSON.stringify({
          model: qModel,
          max_tokens: 1600,
          temperature: 0.55,
          messages: [{ role: "user", content: prompt }],
        }),
      });
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) {
        const msg =
          (data.error && (data.error.message || data.error.msg)) ||
          data.message ||
          resp.statusText;
        throw new Error(msg || `HTTP ${resp.status}`);
      }
      text = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || "";
    } else {
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": key,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-3-5-sonnet-20241022",
          max_tokens: 1600,
          temperature: 0.55,
          messages: [{ role: "user", content: prompt }],
        }),
      });
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) {
        const msg = data.error && data.error.message ? data.error.message : resp.statusText;
        throw new Error(msg || `HTTP ${resp.status}`);
      }
      text =
        (data.content && data.content.map((c) => (c.text != null ? c.text : "")).join("")) || "";
    }
    if (out) out.textContent = (text || "（未返回正文）").trim();
  } catch (e) {
    const hint = (e && e.message) || String(e) || "未知错误";
    let extra = "请检查 API Key、网络或模型权限后重试。";
    if (/invalid x-api-key/i.test(String(hint))) {
      extra =
        "说明：invalid x-api-key 表示 Anthropic 不认可当前密钥。\n\n请改用 https://console.anthropic.com/ → API Keys，或在 local_settings.js 使用 window.__QWEN_API_KEY__ 走千问。";
    }
    if (/Incorrect API key|invalid_api_key|401/i.test(String(hint)) && provider === "qwen") {
      extra =
        "说明：千问接口返回鉴权失败。请到 https://dashscope.console.aliyun.com/apiKey 核对 API-Key，并确认已开通「通义千问」模型与账户余额。\n\n可在 local_settings.js 设置 window.__QWEN_MODEL__ = \"qwen-turbo\" 等可用模型。";
    }
    if (out) {
      out.textContent = `调用失败：${hint}\n\n${extra}`;
    }
  }
  if (btn) btn.disabled = false;
}

/** 把当前品类预测正文复制成一行合法 JSON，便于粘进 sku_predictions_static.json 的 by_cat，再 push 上 Pages */
function copyPredictionJsonLineForPages() {
  const cat = CURRENT_CAT;
  const out = document.getElementById("pred-llm-out");
  if (!cat || !out) return;
  const raw = (out.textContent || "").trim();
  if (!raw || raw === "生成中…" || raw.startsWith("调用失败")) {
    alert("请先在当前品类下成功点「生成预测」，再点本按钮。");
    return;
  }
  const line = JSON.stringify(cat) + ": " + JSON.stringify(raw) + ",";
  const fallbackCopy = (t) => {
    const ta = document.createElement("textarea");
    ta.value = t;
    ta.style.position = "fixed";
    ta.style.left = "-9999px";
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try {
      return document.execCommand("copy");
    } finally {
      document.body.removeChild(ta);
    }
  };
  const done = () =>
    alert(
      "已复制一行。打开「sku_predictions_static.json」，在 \"by_cat\": { 与 } 之间粘贴；多行时每行末尾保留逗号，最后一行去掉末尾逗号。保存后 git push，等 Pages 刷新。"
    );
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(line).then(done).catch(() => {
      if (fallbackCopy(line)) done();
      else alert("复制失败，请手动全选灰色框内文字。");
    });
  } else {
    if (fallbackCopy(line)) done();
    else alert("复制失败，请手动全选灰色框内文字。");
  }
}

【高需低供空白机会】
${blanks.length ? blanks.map(r => `- ${r.dim}「${r.tag}」${r.brand ? `｜品牌「${r.brand}」` : ""}：销量PSD ${r.psd.toFixed(3)}，铺货转化率 ${(r.conv*100).toFixed(0)}%，仅 ${r.sku} 个SKU`).join("\n") : "暂无"}
